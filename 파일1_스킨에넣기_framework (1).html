<!-- 여행 탐색기 CSS -->
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet"/>
<style id="travel-css">
:root{--pine:#2D5016;--red:#D64040;--purple:#7B1FA2;--ski:#1565C0;--gold:#C8860A;--stone:#8C7B6B;--snow:#F5F3EE;--bark:#2A1F14;--cream:#FAF8F4}
.tx-hero{background:linear-gradient(155deg,#1a3a0a,#2D5016 50%,#1e4a5c);padding:16px 20px 20px;text-align:center}
.tx-hero-badge{display:inline-block;background:rgba(255,255,255,0.12);border:1px solid rgba(255,255,255,0.25);color:rgba(255,255,255,0.85);font-size:10px;letter-spacing:2px;text-transform:uppercase;padding:4px 12px;border-radius:20px;margin-bottom:10px}
.tx-hero h1{font-family:'Noto Serif KR',serif;font-size:clamp(20px,5vw,32px);font-weight:700;color:white;line-height:1.3;margin:0 0 6px}
.tx-hero h1 em{color:#90D4A0;font-style:normal}
.tx-hero p{font-size:12px;color:rgba(255,255,255,0.6);margin:0}
.tx-sec{max-width:860px;margin:0 auto;padding:20px 14px 0}
.tx-label{display:flex;align-items:center;gap:8px;font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--pine);margin-bottom:10px}
.tx-label::after{content:'';flex:1;height:1px;background:#C4B8A8}
.tx-mapframe{border-radius:12px;overflow:hidden;border:1px solid #DDD8CE;box-shadow:0 3px 16px rgba(0,0,0,0.08)}
.tx-mapframe iframe{width:100%;height:400px;border:none;display:block}
@media(max-width:600px){.tx-mapframe iframe{height:260px}}
.tx-mapguide{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:8px}
@media(max-width:500px){.tx-mapguide{grid-template-columns:1fr}}
.tx-mg{background:white;border:1px solid #E8E4DC;border-radius:9px;padding:9px 11px;display:flex;align-items:flex-start;gap:7px}
.tx-mg-i{font-size:14px;flex-shrink:0;margin-top:1px}
.tx-mg-t{font-size:11px;font-weight:700;color:var(--bark);display:block;margin-bottom:2px}
.tx-mg-d{font-size:10px;color:#777;line-height:1.5;display:block}
.tx-listbox{background:white;border:1px solid #E8E4DC;border-radius:12px;overflow:hidden}
.tx-listtop{padding:12px 14px 10px;border-bottom:1px solid #F0EEE8}
.tx-listhead{display:flex;align-items:center;gap:8px}
.tx-listtitle{font-family:'Noto Serif KR',serif;font-size:14px;font-weight:700;color:var(--bark)}
.tx-listcnt{background:var(--red);color:white;font-size:10px;font-weight:700;padding:1px 7px;border-radius:10px;display:none}
.tx-listhint{font-size:11px;color:var(--stone);margin-top:4px;line-height:1.6;display:block}
.tx-listhint strong{color:var(--red)}
.tx-listempty{padding:20px 14px;text-align:center;color:var(--stone)}
.tx-listempty .emi{font-size:26px;display:block;margin-bottom:5px}
.tx-listempty p{font-size:12px}
.tx-items{padding:8px 10px;display:none;flex-direction:column;gap:5px}
.tx-items.show{display:flex}
.tx-item{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:9px;background:#FAFAF8;border:1px solid #EEE;animation:txSlide .2s ease}
@keyframes txSlide{from{opacity:0;transform:translateX(-8px)}to{opacity:1;transform:translateX(0)}}
.tx-inum{width:24px;height:24px;border-radius:50%;background:var(--red);color:white;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.tx-inum.food{background:var(--purple)}.tx-inum.ski{background:var(--ski)}.tx-inum.drv{background:var(--gold)}
.tx-iemoji{font-size:15px;flex-shrink:0}
.tx-iinfo{flex:1;min-width:0}
.tx-iname{font-size:12px;font-weight:600;color:var(--bark);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:block}
.tx-isub{font-size:10px;color:var(--stone);display:block}
.tx-igmap{font-size:10px;color:#185FA5;border:1px solid #C5D9F0;padding:3px 7px;border-radius:9px;background:#EEF4FB;flex-shrink:0;text-decoration:none}
.tx-idel{width:22px;height:22px;border-radius:50%;background:#F0EEE8;border:none;display:flex;align-items:center;justify-content:center;font-size:11px;color:#aaa;flex-shrink:0;cursor:pointer}
.tx-listfooter{display:none;gap:6px;padding:10px 12px;border-top:1px solid #F0EEE8;flex-wrap:wrap}
.tx-listfooter.show{display:flex}
.tx-btn-del{font-size:11px;color:var(--stone);border:1px solid #ddd;padding:5px 11px;border-radius:14px;background:white;cursor:pointer}
.tx-btn-img{font-size:11px;color:white;border:none;padding:5px 11px;border-radius:14px;background:var(--ski);cursor:pointer}
.tx-btn-plan{font-size:11px;color:white;border:none;padding:5px 11px;border-radius:14px;background:var(--pine);cursor:pointer}
.tx-fglabel{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--stone);margin-bottom:5px;display:block}
.tx-fgrow{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:8px}
.tx-fbtn{display:inline-flex;align-items:center;padding:6px 12px;border-radius:22px;font-size:12px;font-weight:500;cursor:pointer;border:1.5px solid #DDD8CE;background:white;color:var(--stone);transition:all .15s;user-select:none;-webkit-tap-highlight-color:transparent}
.tx-fbtn.on{background:var(--pine);border-color:var(--pine);color:white}
.tx-fbtn.fsu.on{background:#B86A00;border-color:#B86A00}
.tx-fbtn.ffa.on{background:#8D3A00;border-color:#8D3A00}
.tx-fbtn.fwi.on{background:var(--ski);border-color:var(--ski)}
.tx-fbtn.ffo.on{background:var(--purple);border-color:var(--purple)}
.tx-fbtn.fsk.on{background:#0277BD;border-color:#0277BD}
.tx-cntbar{font-size:12px;color:var(--stone);margin-top:7px;display:block}
.tx-cntbar strong{color:var(--pine);font-weight:700}
.tx-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(255px,1fr));gap:12px}
@media(max-width:600px){.tx-grid{grid-template-columns:1fr;gap:8px}}
.tx-card{background:white;border:1px solid #E8E4DC;border-radius:14px;overflow:hidden;cursor:pointer;display:flex;flex-direction:column;-webkit-tap-highlight-color:rgba(0,0,0,.04);transition:box-shadow .18s,transform .18s}
.tx-card:hover{box-shadow:0 6px 22px rgba(0,0,0,.1);transform:translateY(-2px)}
.tx-card:active{transform:scale(.99)}
.tx-ciw{position:relative;width:100%;height:155px;overflow:hidden;flex-shrink:0}
.tx-cimg{width:100%;height:155px;object-fit:cover;display:block;pointer-events:none}
.tx-cph{width:100%;height:155px;display:none;align-items:center;justify-content:center;font-size:44px;background:linear-gradient(135deg,#EAF3DE,#7ab8d4)}
.tx-cph.show{display:flex}
.tx-nbadge{position:absolute;top:8px;left:8px;min-width:26px;height:26px;border-radius:13px;background:var(--red);color:white;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;padding:0 6px;border:2px solid white;box-shadow:0 2px 5px rgba(0,0,0,.2);z-index:2;pointer-events:none}
.tx-nbadge.food{background:var(--purple)}.tx-nbadge.ski{background:var(--ski)}.tx-nbadge.drv{background:var(--gold)}
.tx-acticons{position:absolute;bottom:7px;right:38px;display:flex;gap:3px;z-index:2;pointer-events:none}
.tx-aic{width:22px;height:22px;border-radius:50%;background:rgba(255,255,255,.92);display:flex;align-items:center;justify-content:center;font-size:12px}
.tx-wish{position:absolute;top:8px;right:8px;z-index:3;width:30px;height:30px;border-radius:50%;background:rgba(255,255,255,.95);border:2px solid #ccc;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;color:#bbb;box-shadow:0 2px 5px rgba(0,0,0,.15);touch-action:manipulation;-webkit-tap-highlight-color:transparent}
.tx-wish.on{background:#FFF0F0;border-color:var(--red);color:var(--red)}
.tx-cbody{padding:11px 13px;flex:1;display:flex;flex-direction:column;gap:5px}
.tx-ccat{display:inline-flex;align-items:center;font-size:10px;font-weight:600;padding:2px 7px;border-radius:9px;width:fit-content}
.tx-cs{background:#EAF3DE;color:#3B6D11}.tx-cf{background:#F3E5F5;color:var(--purple)}.tx-ck{background:#E3F2FD;color:var(--ski)}.tx-cd{background:#FFF8E8;color:#854F0B}
.tx-ctitle{font-family:'Noto Serif KR',serif;font-size:14px;font-weight:700;color:var(--bark);line-height:1.3;display:block}
.tx-csub{font-size:10px;color:var(--stone);display:block}
.tx-ctags{display:flex;flex-wrap:wrap;gap:3px}
.tx-ctag{font-size:10px;padding:2px 7px;border-radius:9px;font-weight:500;display:inline-block}
.tx-cinfo{display:grid;grid-template-columns:1fr 1fr;gap:4px}
.tx-ci{background:var(--snow);border-radius:6px;padding:5px 7px}
.tx-cil{font-size:9px;color:var(--stone);margin-bottom:1px;display:block}
.tx-civ{font-size:11px;font-weight:600;color:var(--bark);display:block}
.tx-cdesc{font-size:11px;color:#666;line-height:1.6;flex:1;display:block}
.tx-cft{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:5px;margin-top:3px}
.tx-gbtn{display:inline-flex;align-items:center;gap:3px;font-size:10px;color:#185FA5;border:1px solid #C5D9F0;padding:4px 9px;border-radius:13px;background:#EEF4FB;font-weight:500;text-decoration:none}
.tx-obtn{color:var(--pine);border-color:#B8D4A0;background:#EEF6E8}
.tx-diff{font-size:10px;color:var(--stone)}
#txModal{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:99999;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .22s;padding:12px}
@media(max-width:600px){#txModal{align-items:flex-end;padding:0}}
#txModal.open{opacity:1;pointer-events:all}
#txModal .mbx{background:white;border-radius:18px;width:100%;max-width:500px;max-height:88vh;overflow-y:auto;transform:translateY(20px) scale(.95);transition:transform .22s;position:relative;-webkit-overflow-scrolling:touch}
@media(max-width:600px){#txModal .mbx{border-radius:18px 18px 0 0;max-height:92vh}}
#txModal.open .mbx{transform:none}
#txModal .miw{position:relative;width:100%;height:200px;overflow:hidden}
#txModal .mimg{width:100%;height:100%;object-fit:cover;display:block}
#txModal .mph{width:100%;height:200px;display:flex;align-items:center;justify-content:center;font-size:64px;background:linear-gradient(135deg,#EAF3DE,#7ab8d4)}
#txModal .mnum{position:absolute;top:12px;left:12px;min-width:30px;height:30px;border-radius:15px;background:var(--red);color:white;font-size:13px;font-weight:700;display:flex;align-items:center;justify-content:center;padding:0 8px;border:2px solid white;box-shadow:0 2px 7px rgba(0,0,0,.22)}
#txModal .mnum.food{background:var(--purple)}#txModal .mnum.ski{background:var(--ski)}#txModal .mnum.drv{background:var(--gold)}
#txModal .mclose{position:absolute;top:10px;right:10px;width:32px;height:32px;border-radius:50%;background:rgba(0,0,0,.45);border:none;display:flex;align-items:center;justify-content:center;font-size:16px;color:white;z-index:10;cursor:pointer;touch-action:manipulation}
#txModal .macts{position:absolute;bottom:10px;right:10px;display:flex;gap:4px}
#txModal .mact{background:rgba(255,255,255,.93);border-radius:18px;padding:3px 9px;font-size:11px;font-weight:500;color:var(--bark)}
#txModal .mbody{padding:15px 17px 20px}
#txModal .mtitle{font-family:'Noto Serif KR',serif;font-size:18px;font-weight:700;color:var(--bark);line-height:1.3;display:block;margin-bottom:3px}
#txModal .msub{font-size:11px;color:var(--stone);margin-bottom:11px;display:block}
#txModal .mdesc{font-size:13px;color:#555;line-height:1.8;margin-bottom:12px;display:block}
#txModal .minfo{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:12px}
#txModal .mi{background:var(--snow);border-radius:8px;padding:8px 10px}
#txModal .mi-l{font-size:10px;color:var(--stone);margin-bottom:2px;display:block}
#txModal .mi-v{font-size:12px;font-weight:600;color:var(--bark);display:block}
#txModal .mtags{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:12px}
#txModal .stips{margin-bottom:12px}
#txModal .stip-t{font-size:12px;font-weight:600;color:var(--bark);margin-bottom:6px;display:block}
#txModal .stip{padding:7px 10px;border-radius:7px;font-size:12px;line-height:1.6;margin-bottom:4px;display:block}
#txModal .st-s{background:#FFF8E8;border-left:3px solid #E8860A;color:#7A4800}
#txModal .st-f{background:#FFF3EE;border-left:3px solid #B04A08;color:#6A2800}
#txModal .st-w{background:#E3F2FD;border-left:3px solid #1565C0;color:#0D3C73}
#txModal .mfooter{display:flex;gap:7px;flex-wrap:wrap;padding-top:11px;border-top:1px solid #F0EEE8}
#txModal .mgmap{display:inline-flex;align-items:center;gap:4px;font-size:12px;color:#185FA5;border:1px solid #C5D9F0;padding:5px 12px;border-radius:18px;background:#EEF4FB;font-weight:500;text-decoration:none}
#txModal .moff{display:inline-flex;align-items:center;gap:4px;font-size:12px;color:var(--pine);border:1px solid #B8D4A0;padding:5px 12px;border-radius:18px;background:#EEF6E8;font-weight:500;text-decoration:none}
#txPlan{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:99998;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s;padding:16px}
#txPlan.open{opacity:1;pointer-events:all}
#txPlan .pbox{background:white;border-radius:16px;width:100%;max-width:500px;max-height:88vh;overflow-y:auto;padding:18px 16px}
#txPlan .pt{font-family:'Noto Serif KR',serif;font-size:15px;font-weight:700;color:var(--bark);display:block;margin-bottom:3px}
#txPlan .ps{font-size:12px;color:var(--stone);display:block;margin-bottom:14px}
#txPlan .pdate-hdr{background:var(--pine);color:white;padding:8px 12px;border-radius:8px;font-size:13px;font-weight:600;margin-bottom:8px;display:flex;align-items:center;gap:8px}
#txPlan .pdate-hdr input{border:none;background:rgba(255,255,255,.2);color:white;padding:3px 8px;border-radius:6px;font-size:12px;font-family:'Noto Sans KR',sans-serif}
#txPlan .pdate-hdr input::-webkit-calendar-picker-indicator{filter:invert(1)}
#txPlan .pitem{border:1px solid #E8E4DC;border-radius:10px;padding:11px;margin-bottom:8px;background:#FAFAF8}
#txPlan .pih{display:flex;align-items:center;gap:8px;margin-bottom:8px}
#txPlan .piN{width:24px;height:24px;border-radius:50%;background:var(--red);color:white;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
#txPlan .piN.food{background:var(--purple)}#txPlan .piN.ski{background:var(--ski)}
#txPlan .piNm{font-size:13px;font-weight:600;color:var(--bark)}
#txPlan .pflds{display:grid;grid-template-columns:1fr 1fr;gap:6px}
#txPlan .pfld{display:block}
#txPlan .pfld label{font-size:10px;color:var(--stone);display:block;margin-bottom:2px;font-weight:500}
#txPlan .pfld input,#txPlan .pfld textarea{width:100%;border:1px solid #ddd;border-radius:6px;padding:5px 8px;font-size:12px;font-family:'Noto Sans KR',sans-serif;color:#333;background:white;display:block}
#txPlan .pfld.ro input{background:#f5f5f5;color:#888}
#txPlan .pfld.full{grid-column:1/-1}
#txPlan .pfld textarea{height:48px;resize:none}
#txPlan .pbtns{display:flex;gap:7px;margin-top:14px;flex-wrap:wrap}
#txPlan .pb-cl{flex:1;padding:10px;border:1px solid #ddd;border-radius:10px;background:white;font-size:12px;cursor:pointer;color:var(--stone)}
#txPlan .pb-im{flex:2;padding:10px;border:none;border-radius:10px;background:var(--ski);color:white;font-size:12px;cursor:pointer;font-weight:600}
#txPlan .pb-cv{flex:2;padding:10px;border:none;border-radius:10px;background:var(--pine);color:white;font-size:12px;cursor:pointer;font-weight:600}
</style>

<!-- 여행 탐색기 HTML 구조 (데이터는 각 글에서 주입) -->
<div id="tx-app" style="display:none">
  <div class="tx-hero" id="txHero">

    <div class="tx-mapguide" id="txMapGuide"></div>

  <div class="tx-sec">
    <div class="tx-label">❤️ 나만의 여행 리스트</div>

      <div class="tx-listtop">
        <div class="tx-listhead">

      </div>
      <div class="tx-listempty" id="txEmpty"><span class="emi">🗺️</span><p>아직 선택한 명소가 없어요<br><span style="font-size:10px;color:#bbb">카드 사진 우측 상단 ＋를 눌러 추가</span></p></div>

  </div>

<!-- 여행 탐색기 엔진 JS -->
<script>
var txMyList=[], txCurF='all', txSpots=[], txData={};

/* 데이터 주입 - 각 글에서 호출 */
function txInit(data){
  txData=data; txSpots=data.spots; txMyList=[]; txCurF='all';
  /* 헤더 */
  document.getElementById('txTitle').innerHTML=data.title;
  document.getElementById('txSubtitle').textContent=data.subtitle||'';
  document.getElementById('txBadge').textContent=data.badge||'🍁 슬기로운 캐나다 생활';
  /* 지도 */
  document.getElementById('txMapIframe').src='https://www.google.com/maps/d/embed?mid='+data.mapId+'&ehbc=2E312F';
  /* 지도 안내 */
  var guides=data.mapGuide||[
    {icon:'📍',t:'핀 클릭하면',d:'구글 사진·리뷰·정보 팝업. 실제 방문자 후기 확인.'},
    {icon:'🔢',t:'지도 번호 = 카드 번호',d:'지도 핀 번호와 아래 카드 번호가 일치합니다.'}
  ];
  document.getElementById('txMapGuide').innerHTML=guides.map(function(g){
    return '<div class="tx-mg"><span class="tx-mg-i">'+g.icon+'</span><div><span class="tx-mg-t">'+g.t+'</span><span class="tx-mg-d">'+g.d+'</span></div></div>';
  }).join('');
  /* 필터 */
  var filters=data.filters||[
    {f:'all',l:'🗺️ 전체',c:''},
    {f:'summer',l:'☀️ 여름',c:'fsu'},
    {f:'fall',l:'🍂 가을',c:'ffa'},
    {f:'winter',l:'❄️ 겨울',c:'fwi'},
    {f:'family',l:'👨‍👩‍👧‍👦 가족',c:''},
    {f:'hiking',l:'🥾 하이킹·카누',c:''},
    {f:'ski',l:'⛷️ 스키',c:'fsk'},
    {f:'photo',l:'📸 사진·뷰',c:''},
    {f:'drive',l:'🚗 드라이브',c:''},
    {f:'food',l:'🍜 한식·일식',c:'ffo'}
  ];
  var fhtml='<span class="tx-fglabel">시즌</span><div class="tx-fgrow">';
  filters.filter(function(f){return ['all','summer','fall','winter'].indexOf(f.f)!==-1;}).forEach(function(f){
    fhtml+='<div class="tx-fbtn '+(f.c||'')+' '+(f.f==='all'?'on':'')+'" data-f="'+f.f+'" onclick="txFilt(this)">'+f.l+'</div>';
  });
  fhtml+='</div><span class="tx-fglabel">스타일</span><div class="tx-fgrow">';
  filters.filter(function(f){return ['all','summer','fall','winter'].indexOf(f.f)===-1;}).forEach(function(f){
    fhtml+='<div class="tx-fbtn '+(f.c||'')+'" data-f="'+f.f+'" onclick="txFilt(this)">'+f.l+'</div>';
  });
  fhtml+='</div>';
  document.getElementById('txFilters').innerHTML=fhtml;
  /* 앱 표시 */
  document.getElementById('tx-app').style.display='block';
  txRender();
}

function txFilt(btn){
  txCurF=btn.getAttribute('data-f');
  document.querySelectorAll('#txFilters .tx-fbtn').forEach(function(b){b.classList.remove('on');});
  btn.classList.add('on');
  txRender();
}

function txRender(){
  var grid=document.getElementById('txGrid');
  grid.innerHTML=''; var count=0;
  txSpots.forEach(function(s){
    if(txCurF!=='all'&&s.tags.indexOf(txCurF)===-1)return;
    count++;
    var nc=s.cat==='food'?'food':s.cat==='ski'?'ski':s.cat==='drive'?'drv':'';
    var ccl=s.cat==='food'?'tx-cf':s.cat==='ski'?'tx-ck':s.cat==='drive'?'tx-cd':'tx-cs';
    var clb=s.cat==='food'?'🍽️ 식당·카페':s.cat==='ski'?'⛷️ 스키장':s.cat==='drive'?'🚗 드라이브':'📍 명소';
    var isOn=txMyList.some(function(x){return x.num===s.num;});
    var acts='';
    if(s.activities&&s.activities.length){
      acts='<div class="tx-acticons">';
      s.activities.forEach(function(a){acts+='<div class="tx-aic">'+(a==='canoe'?'🛶':'⛷️')+'</div>';});
      acts+='</div>';
    }
    var tags=s.badges.map(function(b){return '<span class="tx-ctag" style="background:'+b[1]+';color:'+b[2]+'">'+b[0]+'</span>';}).join('');
    var card=document.createElement('div');
    card.className='tx-card';
    card.innerHTML=
      '<div class="tx-ciw">'
        +'<img class="tx-cimg" src="'+(s.img||'')+'" alt="'+s.title+'" loading="lazy">'
        +'<div class="tx-cph" id="txPh'+s.num+'">'+s.emoji+'</div>'
        +'<div class="tx-nbadge '+nc+'">'+s.num+'</div>'
        +acts
        +'<button class="tx-wish'+(isOn?' on':'')+'" id="txW'+s.num+'">'+(isOn?'✓':'＋')+'</button>'
      +'</div>'
      +'<div class="tx-cbody">'
        +'<span class="tx-ccat '+ccl+'">'+clb+'</span>'
        +'<span class="tx-ctitle">'+s.emoji+' '+s.title+'</span>'
        +'<span class="tx-csub">'+s.sub+'</span>'
        +'<div class="tx-ctags">'+tags+'</div>'
        +'<div class="tx-cinfo">'
          +'<div class="tx-ci"><span class="tx-cil">'+s.info[0][0]+'</span><span class="tx-civ">'+s.info[0][1]+'</span></div>'
          +'<div class="tx-ci"><span class="tx-cil">'+s.info[2][0]+'</span><span class="tx-civ">'+s.info[2][1]+'</span></div>'
        +'</div>'
        +'<span class="tx-cdesc">'+s.desc.substring(0,72)+'...</span>'
        +'<div class="tx-cft">'
          +'<div style="display:flex;gap:4px">'
            +'<a class="tx-gbtn" href="'+s.url+'" target="_blank">지도</a>'
            +(s.officialUrl?'<a class="tx-gbtn tx-obtn" href="'+s.officialUrl+'" target="_blank">공식</a>':'')
          +'</div>'
          +(s.diff?'<span class="tx-diff">'+s.diff+'</span>':'')
        +'</div>'
      +'</div>';
    var img=card.querySelector('.tx-cimg');
    (function(n){img.onerror=function(){this.style.display='none';var ph=document.getElementById('txPh'+n);if(ph)ph.classList.add('show');};})(s.num);
    (function(sp){card.addEventListener('click',function(e){if(e.target.closest('.tx-wish')||e.target.closest('a'))return;txOpenModal(sp);});})(s);
    var wb=card.querySelector('.tx-wish');
    (function(n){function dW(e){e.stopPropagation();e.preventDefault();txToggle(n);}wb.addEventListener('click',dW);wb.addEventListener('touchend',dW,{passive:false});})(s.num);
    grid.appendChild(card);
  });
  var lbl={all:'전체',summer:'☀️ 여름',fall:'🍂 가을',winter:'❄️ 겨울',family:'👨‍👩‍👧‍👦 가족',hiking:'🥾 하이킹·카누',ski:'⛷️ 스키',photo:'📸 사진·뷰',drive:'🚗 드라이브',food:'🍜 한식·일식'}[txCurF]||'';
  document.getElementById('txCntBar').innerHTML='<strong>'+count+'개</strong> '+lbl+' 명소 표시 중';
}

function txOpenModal(s){
  var nc=s.cat==='food'?'food':s.cat==='ski'?'ski':s.cat==='drive'?'drv':'';
  var acts='';
  if(s.activities&&s.activities.length){s.activities.forEach(function(a){acts+='<span class="mact">'+(a==='canoe'?'🛶 카누 인생샷':'⛷️ 스키·스노보드')+'</span>';});}
  document.getElementById('txMIW').innerHTML='<img class="mimg" src="'+s.img+'" onerror="this.outerHTML=\'<div class=mph>'+s.emoji+'</div>\'">'+'<div class="mnum '+nc+'">'+s.num+'</div>'+(acts?'<div class="macts">'+acts+'</div>':'');
  document.getElementById('txMTitle').textContent=s.emoji+' '+s.title;
  document.getElementById('txMSub').textContent=s.sub;
  document.getElementById('txMDesc').textContent=s.desc;
  document.getElementById('txMInfo').innerHTML=s.info.map(function(x){return '<div class="mi"><span class="mi-l">'+x[0]+'</span><span class="mi-v">'+x[1]+'</span></div>';}).join('');
  document.getElementById('txMTags').innerHTML=s.badges.map(function(b){return '<span class="tx-ctag" style="background:'+b[1]+';color:'+b[2]+'">'+b[0]+'</span>';}).join('');
  var tp='';
  if(s.tips&&(s.tips.summer||s.tips.fall||s.tips.winter)){
    tp='<span class="stip-t">🗓️ 시즌별 팁</span>';
    if(s.tips.summer)tp+='<span class="stip st-s">'+s.tips.summer+'</span>';
    if(s.tips.fall)tp+='<span class="stip st-f">'+s.tips.fall+'</span>';
    if(s.tips.winter)tp+='<span class="stip st-w">'+s.tips.winter+'</span>';
  }
  document.getElementById('txMTips').innerHTML=tp;
  document.getElementById('txMFoot').innerHTML='<a class="mgmap" href="'+s.url+'" target="_blank">📍 Google Maps</a>'+(s.officialUrl?'<a class="moff" href="'+s.officialUrl+'" target="_blank">🔗 '+s.officialName+'</a>':'');
  document.getElementById('txModal').classList.add('open');
  document.body.style.overflow='hidden';
}
function txCloseModal(){document.getElementById('txModal').classList.remove('open');document.body.style.overflow='';}
document.getElementById('txModal').addEventListener('click',function(e){if(e.target===this)txCloseModal();});
document.getElementById('txMClose').addEventListener('click',txCloseModal);
document.getElementById('txMClose').addEventListener('touchend',function(e){e.preventDefault();txCloseModal();},{passive:false});

function txToggle(num){
  var s=txSpots.find(function(x){return x.num===num;});
  if(!s)return;
  var idx=txMyList.findIndex(function(x){return x.num===num;});
  var btn=document.getElementById('txW'+num);
  if(idx===-1){txMyList.push(s);if(btn){btn.innerHTML='✓';btn.classList.add('on');}}
  else{txMyList.splice(idx,1);if(btn){btn.innerHTML='＋';btn.classList.remove('on');}}
  txRenderList();
}
function txRemove(num){
  txMyList=txMyList.filter(function(x){return x.num!==num;});
  var b=document.getElementById('txW'+num);
  if(b){b.innerHTML='＋';b.classList.remove('on');}
  txRenderList();
}
function txClear(){
  txMyList.forEach(function(s){var b=document.getElementById('txW'+s.num);if(b){b.innerHTML='＋';b.classList.remove('on');}});
  txMyList=[];txRenderList();
}
function txRenderList(){
  var empty=document.getElementById('txEmpty'),items=document.getElementById('txItems'),footer=document.getElementById('txFooter'),cnt=document.getElementById('txCnt');
  if(!txMyList.length){empty.style.display='block';items.classList.remove('show');footer.classList.remove('show');cnt.style.display='none';return;}
  empty.style.display='none';items.classList.add('show');footer.classList.add('show');cnt.style.display='inline-flex';cnt.textContent=txMyList.length;
  items.innerHTML=txMyList.map(function(s){
    var nc=s.cat==='food'?'food':s.cat==='ski'?'ski':s.cat==='drive'?'drv':'';
    return '<div class="tx-item"><div class="tx-inum '+nc+'">'+s.num+'</div><div class="tx-iemoji">'+s.emoji+'</div><div class="tx-iinfo"><span class="tx-iname">'+s.title+'</span><span class="tx-isub">'+s.info[0][1]+' · '+s.info[2][1]+'</span></div><a class="tx-igmap" href="'+s.url+'" target="_blank">지도</a><button class="tx-idel" data-num="'+s.num+'">✕</button></div>';
  }).join('');
  items.querySelectorAll('.tx-idel').forEach(function(b){b.addEventListener('click',function(){txRemove(this.getAttribute('data-num'));});});
}

function txOpenPlan(){
  if(!txMyList.length){alert('먼저 명소를 선택해 주세요!');return;}
  document.getElementById('txPlanItems').innerHTML=
    '<div class="pdate-hdr"><span>📅 방문 날짜</span><input type="date" id="txPD"></div>'
    +txMyList.map(function(s){
      var nc=s.cat==='food'?'food':s.cat==='ski'?'ski':'';
      return '<div class="pitem"><div class="pih"><div class="piN '+nc+'">'+s.num+'</div><span class="piNm">'+s.emoji+' '+s.title+'</span></div>'
        +'<div class="pflds">'
        +'<div class="pfld"><label>⏰ 방문 시간</label><input type="time" id="txPT'+s.num+'"></div>'
        +'<div class="pfld ro"><label>🗺️ 지도 번호</label><input type="text" value="'+s.num+'" readonly></div>'
        +'<div class="pfld ro"><label>📍 명소명</label><input type="text" value="'+s.title+'" readonly></div>'
        +'<div class="pfld ro"><label>⏱ 소요시간</label><input type="text" value="'+s.info[2][1]+'" readonly></div>'
        +'<div class="pfld ro"><label>🎫 입장료</label><input type="text" value="'+s.info[0][1]+'" readonly></div>'
        +'<div class="pfld ro"><label>🅿️ 주차</label><input type="text" value="'+s.info[1][1]+'" readonly></div>'
        +'<div class="pfld full"><label>📝 메모</label><textarea id="txPM'+s.num+'" placeholder="준비물, 예약, 동행자 등"></textarea></div>'
        +'</div></div>';
    }).join('');
  document.getElementById('txPlan').classList.add('open');
  document.body.style.overflow='hidden';
}
function txClosePlan(){document.getElementById('txPlan').classList.remove('open');document.body.style.overflow='';}
document.getElementById('txPlan').addEventListener('click',function(e){if(e.target===this)txClosePlan();});

function _txTimelineHTML(list, dateStr, withMemo){
  return list.map(function(s,i){
    var time=(document.getElementById('txPT'+s.num)||{}).value||'';
    var memo=withMemo?((document.getElementById('txPM'+s.num)||{}).value||''):'';
    var isLast=i===list.length-1;
    return '<div style="display:flex;gap:0;align-items:stretch">'
      +'<div style="width:52px;text-align:right;padding-right:10px;padding-top:3px;flex-shrink:0">'
        +(time?'<span style="font-size:13px;font-weight:700;color:#1565C0">'+time+'</span>':'<span style="font-size:12px;color:#ccc">--:--</span>')
      +'</div>'
      +'<div style="display:flex;flex-direction:column;align-items:center;flex-shrink:0;width:20px">'
        +'<div style="width:12px;height:12px;border-radius:50%;background:#D64040;border:2.5px solid white;box-shadow:0 0 0 2px #D64040;flex-shrink:0;margin-top:3px"></div>'
        +(!isLast?'<div style="width:2px;flex:1;background:#e8e8e8;min-height:24px;margin-top:2px"></div>':'')
      +'</div>'
      +'<div style="flex:1;padding:0 0 20px 10px">'
        +'<div style="font-size:14px;font-weight:700;color:#1a1a1a;line-height:1.4;margin-bottom:3px">'
          +'<span style="display:inline-flex;align-items:center;justify-content:center;min-width:22px;height:22px;border-radius:11px;background:#D64040;color:white;font-size:10px;font-weight:700;padding:0 5px;margin-right:5px;vertical-align:middle">'+s.num+'</span>'
          +s.emoji+' '+s.title
        +'</div>'
        +(memo?'<div style="font-size:12px;color:#555;line-height:1.6;margin-bottom:4px;background:#f8f8f6;padding:5px 8px;border-radius:6px">'+memo+'</div>':'')
        +'<div style="font-size:11px;color:#bbb">'+s.info[0][1]+(s.info[2][1]?' · '+s.info[2][1]:'')+'</div>'
      +'</div>'
    +'</div>';
  }).join('');
}

function _txOpenWindow(titleText, dateStr, rows, note){
  var w=window.open('','_blank','width=500,height=860');
  w.document.write('<html><head><meta charset="UTF-8"><title>'+titleText+'</title>'
    +'<style>body{font-family:sans-serif;padding:24px;max-width:460px;margin:0 auto;background:white}@media print{body{padding:16px}}</style></head><body>'
    +'<div style="text-align:center;margin-bottom:22px">'
    +'<div style="font-size:28px">🍁</div>'
    +'<h2 style="font-size:17px;margin:6px 0;color:#2D5016;font-family:serif">'+titleText+'</h2>'
    +(dateStr?'<div style="display:inline-block;background:#1565C0;color:white;font-size:13px;font-weight:700;padding:4px 14px;border-radius:20px;margin:4px 0">'+dateStr+'</div><br>':'')
    +'<span style="font-size:11px;color:#aaa">슬기로운 캐나다 생활</span></div>'
    +'<div>'+rows+'</div>'
    +'<div style="margin-top:20px;padding-top:14px;border-top:1px solid #eee;text-align:center;font-size:10px;color:#bbb">'+note+'</div>'
    +'</body></html>');
  w.document.close();
  setTimeout(function(){w.print();},600);
}

function txSaveImg(){
  if(!txMyList.length){alert('먼저 명소를 선택해 주세요!');return;}
  var rows=_txTimelineHTML(txMyList,'',false);
  _txOpenWindow('나만의 '+txData.regionName+' 여행 리스트','',rows,'날짜·시간·메모 추가는 📋 일정표 만들기를 이용하세요');
}
function txPlanImg(){
  var dateVal=(document.getElementById('txPD')||{}).value||'';
  var dateStr='';
  if(dateVal){var d=new Date(dateVal);var days=['일','월','화','수','목','금','토'];dateStr=(d.getMonth()+1)+'월 '+d.getDate()+'일 ('+days[d.getDay()]+')';}
  var rows=_txTimelineHTML(txMyList,dateStr,true);
  _txOpenWindow('나만의 '+txData.regionName+' 여행 일정표',dateStr,rows,'Ctrl+P → PDF 저장 | 슬기로운 캐나다 생활');
}
function txPlanCSV(){
  var date=(document.getElementById('txPD')||{}).value||'';
  var BOM='\uFEFF';
  var H=['순서','지도번호','날짜','시간','명소','소요시간','입장료','주차','메모'];
  var rows=txMyList.map(function(s,i){
    var time=((document.getElementById('txPT'+s.num)||{}).value)||'';
    var memo=(((document.getElementById('txPM'+s.num)||{}).value)||'').replace(/,/g,'，').replace(/\n/g,' ');
    return [i+1,s.num,date,time,'"'+s.title+'"','"'+s.info[2][1]+'"','"'+s.info[0][1]+'"','"'+s.info[1][1]+'"','"'+memo+'"'].join(',');
  });
  var a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([BOM+H.join(',')+'\n'+rows.join('\n')],{type:'text/csv;charset=utf-8'}));
  a.download=txData.regionName+'_여행_일정표.csv';
  a.click();
}
</script>
